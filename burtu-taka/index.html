<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Burtu Taka</title>
<meta name="description" content="Burtu un ciparu rakstīšanas prakse bērniem - velc pa ceļu, savāc zemenītes!">
<meta name="theme-color" content="#6FAE3A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Burtu Taka">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sun"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>

<div class="topbar">
  <div class="score">🍓 <span id="scoreVal">0</span></div>
  <button class="scriptToggle" id="scriptToggle" type="button" aria-pressed="false">
    <span class="scriptToggle-label" data-script="print">Aa</span>
    <span class="scriptToggle-knob"></span>
    <span class="scriptToggle-label" data-script="cursive">Aa</span>
  </button>
</div>

<div class="wrap">
  <h1>Burtu Taka</h1>
  <div class="subtitle">Velc pa ceļu pareizajā virzienā un savāc zemenītes!</div>

  <div class="setTabs" id="setTabs"></div>

  <div class="card" id="card">
    <div class="hint-bubble" id="hintBubble">Sāc no šejienes! 🐞</div>
    <canvas id="cv" width="480" height="480"></canvas>
    <div class="celebrate" id="celebrate">
      <div class="big">🦋🌸🦋</div>
      <div class="msg" id="celebrateMsg">Lieliski!</div>
    </div>
  </div>

  <div class="progressDots" id="dots"></div>

  <div class="chips" id="chips"></div>

  <div class="footer-note">Burtu Taka PWA — velc ar pirkstu, peli vai planšetes pildspalvu</div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
